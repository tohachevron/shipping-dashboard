<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chevron Lines - Logistics Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; font-size: 13px; }
        .formal-input { border: 1px solid #cbd5e1; border-radius: 4px; padding: 6px 10px; outline: none; width: 100%; transition: all 0.2s; }
        .formal-input:focus { border-color: #1e293b; }
        .suggestion-box { position: absolute; z-index: 100; width: 100%; max-height: 150px; overflow-y: auto; background: white; border: 1px solid #cbd5e1; border-radius: 4px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-top: 2px; }
        .suggestion-item { padding: 6px 10px; cursor: pointer; border-bottom: 1px solid #f1f5f9; font-size: 12px; }
        .suggestion-item:hover { background-color: #f1f5f9; color: #1e293b; font-weight: 500; }

        @media print {
            @page { size: landscape; margin: 10mm; }
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; }
            table { width: 100% !important; border-collapse: collapse !important; border: 1px solid #000 !important; }
            th, td { border: 1px solid #000 !important; padding: 5px !important; font-size: 10px !important; color: black !important; }
            th { background-color: #f2f2f2 !important; -webkit-print-color-adjust: exact; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="text-slate-800">

    <div id="printArea" class="hidden print:block">
        <div style="text-align: center; border-bottom: 2px solid black; padding-bottom: 10px; margin-bottom: 15px;">
            <h1 style="font-size: 24px; font-weight: bold; margin: 0;">CHEVRON LINES (C & F) LTD.</h1>
            <p style="font-size: 13px; margin: 5px 0;">AZIZ COURT (5TH FLOOR) 88-90, AGRABAD C/A, CHITTAGONG</p>
            <h3 style="font-size: 16px; margin-top: 10px; font-weight: bold; text-transform: uppercase;">Daily Examine and Delivery Program</h3>
            <p id="printDateDisplay" style="font-size: 14px; font-weight: bold; margin-top: 5px;"></p>
        </div>
        <div id="printTableContainer"></div>
    </div>

    <div class="max-w-[1550px] mx-auto px-4 py-4 no-print">
        <header class="flex justify-between items-center bg-slate-900 text-white p-4 rounded-t-lg">
            <div>
                <h1 class="text-lg font-bold">CHEVRON LINES (C & F) LTD.</h1>
                <p class="text-[10px] text-slate-400 font-medium">SEQUENTIAL DATABASE PORTAL</p>
            </div>
            <button id="lockBtn" onclick="toggleAdmin()" class="bg-white text-slate-900 px-4 py-1.5 rounded text-xs font-bold hover:bg-slate-100">
                <span id="lockText">Unlock Editor</span>
            </button>
        </header>

        <section id="adminPanel" class="hidden bg-white border-x border-b border-slate-200 p-6 shadow-sm mb-6">
            <form id="entryForm" class="grid grid-cols-1 md:grid-cols-4 lg:grid-cols-6 gap-4">
                <input type="hidden" id="editId">
                <div class="relative"><label class="text-[10px] font-bold text-slate-500 uppercase">Program Date</label><input type="date" id="entryDate" class="formal-input" required></div>
                <div class="relative"><label class="text-[10px] font-bold text-slate-500 uppercase">Job No</label><input type="text" id="jobNo" class="formal-input font-bold" required></div>
                <div class="relative"><label class="text-[10px] font-bold text-slate-500 uppercase">Importer</label><input type="text" id="importer" class="formal-input" required></div>
                <div class="relative"><label class="text-[10px] font-bold text-slate-500 uppercase">Item</label><input type="text" id="item" class="formal-input" required></div>
                <div class="relative"><label class="text-[10px] font-bold text-slate-500 uppercase">BL No</label><input type="text" id="bl_no" class="formal-input bg-slate-50" readonly></div>
                <div class="relative" id="yardParent"><label class="text-[10px] font-bold text-slate-500 uppercase">Yard</label><input type="text" id="yard" class="formal-input" required autocomplete="off"></div>
                <div class="relative" id="personParent"><label class="text-[10px] font-bold text-slate-500 uppercase">Person</label><input type="text" id="person" class="formal-input" required autocomplete="off"></div>
                
                <div class="flex items-center gap-4 bg-slate-50 p-2 border rounded border-slate-200">
                    <label class="flex items-center gap-1 text-[11px] font-bold"><input type="checkbox" id="examine"> EXM</label>
                    <label class="flex items-center gap-1 text-[11px] font-bold"><input type="checkbox" id="delivery" onchange="checkTransport()"> DEL</label>
                </div>
                
                <div class="relative" id="transportParent"><label class="text-[10px] font-bold text-slate-500 uppercase">Transport</label><input type="text" id="transport" class="formal-input bg-slate-100" disabled autocomplete="off"></div>
                
                <div class="md:col-span-2 flex gap-2 pt-4">
                    <button type="submit" class="bg-blue-700 text-white px-6 py-2 rounded font-bold text-xs">SAVE TO DB</button>
                    <button type="button" onclick="cancelEdit()" class="bg-slate-200 text-slate-600 px-4 py-2 rounded font-bold text-xs">CLEAR</button>
                </div>
            </form>
        </section>

        <!-- Filters Section -->
        <div class="flex flex-wrap gap-4 items-end bg-white p-4 border border-slate-200 rounded-lg mt-4 shadow-sm">
            <div class="flex-1 min-w-[200px]">
                <label class="text-[10px] font-bold text-slate-500 uppercase">Global Search</label>
                <input type="text" id="globalSearch" oninput="refreshTable()" placeholder="Search Job, Importer, Person..." class="formal-input">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase">Category</label>
                <select id="filterCategory" onchange="refreshTable()" class="formal-input">
                    <option value="all">Show All</option>
                    <option value="examine">Examination Only</option>
                    <option value="delivery">Delivery Only</option>
                </select>
            </div>
            <div><label class="text-[10px] font-bold text-slate-500 uppercase">From</label><input type="date" id="filterFrom" onchange="refreshTable()" class="formal-input"></div>
            <div><label class="text-[10px] font-bold text-slate-500 uppercase">To</label><input type="date" id="filterTo" onchange="refreshTable()" class="formal-input"></div>
            <button onclick="refreshTable()" class="bg-slate-800 text-white px-8 py-2 rounded text-xs font-bold">APPLY</button>
            <button onclick="clearFilters()" class="bg-slate-200 text-slate-700 px-4 py-2 rounded text-xs font-bold">RESET</button>
            <button onclick="printReport()" class="bg-emerald-700 text-white px-8 py-2 rounded text-xs font-bold">PRINT PDF</button>
        </div>

        <div class="mt-6 bg-white border border-slate-200 rounded shadow-sm overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-100 border-b border-slate-300">
                    <tr>
                        <th class="p-2 text-[10px] font-bold uppercase border-r">DB ID</th>
                        <th class="p-2 text-[10px] font-bold uppercase border-r">Date</th>
                        <th class="p-2 text-[10px] font-bold uppercase border-r">Job No</th>
                        <th class="p-2 text-[10px] font-bold uppercase border-r">Importer</th>
                        <th class="p-2 text-[10px] font-bold uppercase border-r">Item</th>
                        <th class="p-2 text-[10px] font-bold uppercase border-r">BL No</th>
                        <th class="p-2 text-[10px] font-bold uppercase text-center border-r">EXM</th>
                        <th class="p-2 text-[10px] font-bold uppercase text-center border-r">DEL</th>
                        <th class="p-2 text-[10px] font-bold uppercase border-r">Yard</th>
                        <th class="p-2 text-[10px] font-bold uppercase border-r">Assign</th>
                        <th class="p-2 text-[10px] font-bold uppercase border-r">Transport</th>
                        <th class="p-2 text-[10px] font-bold uppercase text-center admin-action hidden">Action</th>
                    </tr>
                </thead>
                <tbody id="dataTable" class="divide-y divide-slate-200"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vhlzalgatarrrobjympc.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_hEkIgLpmeXaMCz37CH_Ycg_AwwaMuEy';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let records = [];
        let isEditMode = false;

        async function fetchRecords() {
            const { data, error } = await _supabase.from('programs').select('*').order('id', { ascending: false });
            if (!error) {
                records = data;
                refreshTable();
            }
        }

        function formatDate(dateStr) {
            if(!dateStr) return "-";
            const [y, m, d] = dateStr.split("-");
            return `${d}-${m}-${y}`;
        }

        function toggleAdmin() {
            if (!isEditMode) {
                if (prompt("Enter Access Code:") === "000") {
                    isEditMode = true;
                    document.getElementById('adminPanel').classList.remove('hidden');
                    document.querySelectorAll('.admin-action').forEach(e => e.classList.remove('hidden'));
                    document.getElementById('lockText').innerText = "Lock Editor";
                    document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
                    refreshTable();
                }
            } else {
                isEditMode = false;
                document.getElementById('adminPanel').classList.add('hidden');
                document.querySelectorAll('.admin-action').forEach(e => e.classList.add('hidden'));
                document.getElementById('lockText').innerText = "Unlock Editor";
                cancelEdit();
                refreshTable();
            }
        }

        async function autoFillFromSupabase() {
            const jobField = document.getElementById('jobNo');
            const val = jobField.value.trim();
            if(!val) return;
            try {
                const { data } = await _supabase.from('assessments').select('*').eq('job', val).maybeSingle();
                if (data) {
                    document.getElementById('importer').value = data.importer || '';
                    document.getElementById('item').value = data.description || '';
                    document.getElementById('bl_no').value = data.bl_no || '';
                }
            } catch (e) { console.error(e); }
        }
        document.getElementById('jobNo').addEventListener('blur', autoFillFromSupabase);

        function checkTransport() {
            const del = document.getElementById('delivery').checked;
            const t = document.getElementById('transport');
            t.disabled = !del;
            t.classList.toggle('bg-slate-100', !del);
            if (!del) t.value = '';
        }

        document.getElementById('entryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const jobNo = document.getElementById('jobNo').value;
            const isExm = document.getElementById('examine').checked;
            const isDel = document.getElementById('delivery').checked;

            if (!editId) {
                if (isExm && records.find(r => r.job_no === jobNo && r.examine)) {
                    const found = records.find(r => r.job_no === jobNo && r.examine);
                    alert(`EXM for Job ${jobNo} already programmed on ${formatDate(found.program_date)} (ID: ${found.id})`);
                    return;
                }
                if (isDel && records.find(r => r.job_no === jobNo && r.delivery)) {
                    const found = records.find(r => r.job_no === jobNo && r.delivery);
                    alert(`DEL for Job ${jobNo} already programmed on ${formatDate(found.program_date)} (ID: ${found.id})`);
                    return;
                }
            }

            const entry = {
                program_date: document.getElementById('entryDate').value,
                job_no: jobNo,
                importer: document.getElementById('importer').value,
                item: document.getElementById('item').value,
                bl_no: document.getElementById('bl_no').value,
                yard: document.getElementById('yard').value,
                person: document.getElementById('person').value,
                examine: isExm,
                delivery: isDel,
                transport: document.getElementById('transport').value || '-'
            };

            if (editId) {
                await _supabase.from('programs').update(entry).eq('id', editId);
            } else {
                await _supabase.from('programs').insert([entry]);
            }

            cancelEdit();
            await fetchRecords();
        });

        function refreshTable() {
            const tbody = document.getElementById('dataTable');
            const from = document.getElementById('filterFrom').value;
            const to = document.getElementById('filterTo').value;
            const q = document.getElementById('globalSearch').value.toLowerCase();
            const cat = document.getElementById('filterCategory').value;

            let filtered = [...records];
            
            if (from && to) filtered = filtered.filter(r => r.program_date >= from && r.program_date <= to);
            else if (from) filtered = filtered.filter(r => r.program_date === from);

            if (cat === 'examine') filtered = filtered.filter(r => r.examine);
            if (cat === 'delivery') filtered = filtered.filter(r => r.delivery);

            if (q) {
                filtered = filtered.filter(r => 
                    r.job_no.toLowerCase().includes(q) || 
                    r.importer.toLowerCase().includes(q) || 
                    r.person.toLowerCase().includes(q) ||
                    r.id.toString().includes(q)
                );
            }

            tbody.innerHTML = filtered.map((r) => `
                <tr class="hover:bg-slate-50 transition">
                    <td class="p-2 border-r text-center text-slate-400 font-mono">#${r.id}</td>
                    <td class="p-2 border-r whitespace-nowrap">${formatDate(r.program_date)}</td>
                    <td class="p-2 border-r font-bold">${r.job_no}</td>
                    <td class="p-2 border-r">${r.importer}</td>
                    <td class="p-2 border-r">${r.item}</td>
                    <td class="p-2 border-r font-mono text-[9px]">${r.bl_no || '-'}</td>
                    <td class="p-2 border-r text-center font-bold">${r.examine ? 'Y' : '-'}</td>
                    <td class="p-2 border-r text-center font-bold">${r.delivery ? 'Y' : '-'}</td>
                    <td class="p-2 border-r">${r.yard}</td>
                    <td class="p-2 border-r font-semibold">${r.person}</td>
                    <td class="p-2 border-r">${r.transport}</td>
                    <td class="p-2 text-center admin-action ${isEditMode ? '' : 'hidden'}">
                        <button onclick="editRecord(${r.id})" class="text-blue-600 font-bold mr-2">E</button>
                        <button onclick="deleteRecord(${r.id})" class="text-red-500 font-bold">D</button>
                    </td>
                </tr>`).join('');
        }

        async function deleteRecord(id) {
            if(confirm(`Delete ID #${id} permanently?`)) {
                await _supabase.from('programs').delete().eq('id', id);
                await fetchRecords();
            }
        }

        function editRecord(id) {
            const r = records.find(x => x.id === id);
            document.getElementById('editId').value = r.id;
            document.getElementById('entryDate').value = r.program_date;
            document.getElementById('jobNo').value = r.job_no;
            document.getElementById('importer').value = r.importer;
            document.getElementById('item').value = r.item;
            document.getElementById('bl_no').value = r.bl_no || '';
            document.getElementById('yard').value = r.yard;
            document.getElementById('person').value = r.person;
            document.getElementById('examine').checked = r.examine;
            document.getElementById('delivery').checked = r.delivery;
            document.getElementById('transport').value = r.transport === '-' ? '' : r.transport;
            checkTransport();
            document.getElementById('adminPanel').classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function cancelEdit() { 
            document.getElementById('entryForm').reset(); 
            document.getElementById('editId').value = ""; 
            document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
            checkTransport(); 
        }

        function clearFilters() {
            document.getElementById('filterFrom').value = '';
            document.getElementById('filterTo').value = '';
            document.getElementById('globalSearch').value = '';
            document.getElementById('filterCategory').value = 'all';
            refreshTable();
        }

        function printReport() {
            const from = document.getElementById('filterFrom').value;
            const to = document.getElementById('filterTo').value;
            const dateDisplay = document.getElementById('printDateDisplay');
            
            if (!from && !to) dateDisplay.innerText = `DATE: ${formatDate(new Date().toISOString().split('T')[0])}`;
            else if (from === to || !to || !from) dateDisplay.innerText = `DATE: ${formatDate(from || to)}`;
            else dateDisplay.innerText = `PERIOD: ${formatDate(from)} TO ${formatDate(to)}`;

            const originalTable = document.querySelector('table').cloneNode(true);
            originalTable.querySelectorAll('.admin-action').forEach(a => a.remove());
            document.getElementById('printTableContainer').innerHTML = '';
            document.getElementById('printTableContainer').appendChild(originalTable);
            window.print();
        }

        // --- FIXED SUGGESTION LOGIC ---
        const setupSug = (inputId, parentId, dbField) => {
            const input = document.getElementById(inputId);
            input.addEventListener('input', () => {
                const val = input.value.toLowerCase();
                const parent = document.getElementById(parentId);
                
                // Clear existing box
                const old = parent.querySelector('.suggestion-box');
                if (old) old.remove();
                
                if (!val || records.length === 0) return;

                // Extract unique values from the live records
                const matches = [...new Set(records
                    .map(r => r[dbField])
                    .filter(v => v && v !== '-' && v.toLowerCase().includes(val))
                )].slice(0, 5); // Limit to 5 suggestions

                if (matches.length > 0) {
                    const box = document.createElement('div');
                    box.className = 'suggestion-box';
                    matches.forEach(m => {
                        const div = document.createElement('div');
                        div.className = 'suggestion-item';
                        div.innerText = m;
                        div.onclick = () => {
                            input.value = m;
                            box.remove();
                        };
                        box.appendChild(div);
                    });
                    parent.appendChild(box);
                }
            });

            // Close box when clicking outside
            document.addEventListener('click', (e) => {
                if (!input.contains(e.target)) {
                    const box = document.getElementById(parentId).querySelector('.suggestion-box');
                    if (box) box.remove();
                }
            });
        };

        // Initialize suggestions with correct DB fields
        setupSug('yard', 'yardParent', 'yard');
        setupSug('person', 'personParent', 'person');
        setupSug('transport', 'transportParent', 'transport');

        window.onload = fetchRecords;
    </script>
</body>
</html>
